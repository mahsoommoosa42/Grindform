# .github/workflows/ci.yml
#
# CI pipeline for the Grindform monorepo.
#
# Jobs:
#   - test    Typecheck + run every package's vitest suite under its
#             100% coverage threshold (configured per-package in
#             vitest.config.ts).
#   - lint    Prettier format check + ESLint over packages/.
#   - python  ruff lint + format check via the uv-managed toolchain.
#   - e2e     Playwright end-to-end across Chromium + WebKit, every
#             screen config (mobile / tablet / laptop) and touch.
#
# Bun is pinned so a future release can't silently change test-runner
# behaviour mid-PR.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Unit + integration tests (coverage gate)
        run: bun run test:coverage

  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Prettier format check
        run: bun run format:check
      - name: ESLint
        run: bun run lint

  python:
    name: Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Sync toolchain
        run: cd tools/python && uv sync
      - name: ruff lint
        run: bun run py:lint
      - name: ruff format check
        run: bun run py:format:check

  e2e:
    name: Playwright E2E (Chromium + WebKit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: cd packages/web && bunx playwright install --with-deps chromium webkit
      - name: Run E2E suite
        run: bun run test:e2e
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/web/playwright-report
          retention-days: 7
