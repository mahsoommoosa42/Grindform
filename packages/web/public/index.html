<!doctype html>
<html lang="en" data-theme="pulse">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <title>Grindform — Plan &amp; track your week</title>
    <link rel="stylesheet" href="/styles.css" />
    <script>
      // Apply the saved theme before first paint to avoid a flash.
      try {
        const saved = localStorage.getItem('gf-theme');
        if (saved) document.documentElement.setAttribute('data-theme', saved);
      } catch (_) {
        /* localStorage may be unavailable; default theme stays. */
      }
    </script>
    <script type="module" src="/app/main.js"></script>
  </head>
  <body>
    <gf-app></gf-app>
    <noscript>Grindform needs JavaScript enabled.</noscript>
  </body>
</html>
