# fly.io deployment for Grindform.
#
#   fly launch --no-deploy        # create the app (first time only)
#   fly volumes create grindform_data --size 1
#   fly deploy
#
# The mounted volume backs PGlite so plans + logs survive restarts.

app = "grindform"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  GRINDFORM_DATA_DIR = "/data"

[[mounts]]
  source = "grindform_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/v1/health"
