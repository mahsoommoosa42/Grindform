# .pre-commit-config.yaml
# ----------------------------------------------------------------------
# Git pre-commit hooks for Grindform.
#
# Pre-commit covers file-hygiene basics (trailing whitespace, EOF, line
# endings, big files, merge-conflict markers, valid YAML/JSON) plus ruff
# for any Python. Prettier + ESLint are NOT duplicated here — they gate
# every PR via .github/workflows/ci.yml and can be run locally with
# `bun run format` / `bun run lint`.
#
# One-time setup (after `uv sync` in tools/python/):
#     cd tools/python && uv run pre-commit install
# ----------------------------------------------------------------------

default_language_version:
  python: python3.12

exclude: |
  (?x)^(
    .*\.lock$|
    .*\.lockb$|
    bun\.lock|
    tools/python/uv\.lock|
    packages/web/static/vendor/.*|
    .*\.min\.(js|css)$
  )$

repos:
  # ---- generic file hygiene ------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        # tsconfig*.json are JSONC (with comments) and fail stdlib json.
        exclude: |
          (?x)^(
            (.*/)?tsconfig.*\.json$
          )$
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: mixed-line-ending
        args: [--fix=lf]

  # ---- Python: ruff (lint + format) ----------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--config=tools/python/pyproject.toml]
      - id: ruff-format
        args: [--config=tools/python/pyproject.toml]
